<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ข้อมูลสัตว์ดอง - Limpet</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; padding: 20px; color: #333; max-width: 600px; margin: auto; }
        .card { border: 1px solid #ddd; border-radius: 10px; padding: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .label { font-weight: bold; color: #7f8c8d; }
        .value { font-size: 1.1em; margin-bottom: 15px; }
        img { max-width: 100%; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Limpet (หอยหมวกเจ๊ก)</h1>
        <p class="label">ชื่อวิทยาศาสตร์:</p>
        <p class="value"><i>Siphonaria atra</i></p>
        
        <p class="label">รหัสตัวอย่าง (ID):</p>
        <p class="value">B2L1-001</p>
        
        <p class="label">สถานที่เก็บรักษา:</p>
        <p class="value">พิพิธภัณฑ์ธรรมชาติวิทยา (ห้องดอง 2)</p>

        <p class="label">วันที่เก็บตัวอย่าง:</p>
        <p class="value">15 มกราคม 2026</p>
    </div>
</body>
</html>
